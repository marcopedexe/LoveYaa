<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just One Question 💘</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    font-family: "Poppins", sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #e6dcff, #d4c5ff, #cdb4ff);
    overflow: hidden;
}

/* floating blobs */
.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.6;
    animation: float 10s infinite alternate ease-in-out;
}

.blob1 { width: 300px; height: 300px; background:#cdb4ff; top:10%; left:10%; }
.blob2 { width: 250px; height: 250px; background:#b8a2ff; bottom:10%; right:10%; }

@keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(40px); }
}

/* card */
.card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(18px);
    padding: 40px 30px;
    border-radius: 28px;
    text-align: center;
    width: 350px;
    box-shadow: 0 15px 40px rgba(120, 90, 200, 0.15);
    border: 1px solid rgba(180, 160, 255, 0.4);
    animation: pop 0.8s ease;
}

@keyframes pop {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

h2 {
    font-weight: 600;
    color: #5a4a8a;
    margin-bottom: 30px;
    transition: 0.3s ease;
}

/* buttons */
.buttons {
    position: relative;
    height: 120px;
}

button {
    border: none;
    border-radius: 999px;
    padding: 14px 28px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: absolute;
}

/* YES */
#yes {
    left: 20%;
    background: linear-gradient(135deg, #9d7bff, #c8b6ff);
    color: white;
    box-shadow: 0 5px 15px rgba(157, 123, 255, 0.4);
}

/* NO */
#no {
    left: 55%;
    background: rgba(255,255,255,0.9);
    color: #777;
    border: 1px solid rgba(160,140,255,0.3);
}

/* hint */
.hint {
    margin-top: 20px;
    font-size: 13px;
    color: #7a6ca8;
}
</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">
    <h2 id="question">Hey... I just wanna ask 💗<br>Do you love me?</h2>

    <div class="buttons">
        <button id="yes">Yes 💖</button>
        <button id="no">No 😅</button>
    </div>

    <div class="hint">be honest hehe</div>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const question = document.getElementById("question");
const card = document.querySelector(".card");

let scale = 1;

// move NO + grow YES
function moveNo() {
    const cardRect = card.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();

    const maxX = cardRect.width - btnRect.width;
    const maxY = cardRect.height - btnRect.height;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";

    // grow YES continuously
    scale += 0.2;
    yesBtn.style.transform = `scale(${scale})`;

    // when YES dominates screen
    if (scale >= 3) {
        question.innerHTML = "just say yes 💖🥺";
    }
}

// hover (desktop)
noBtn.addEventListener("mouseenter", moveNo);

// tap (mobile)
noBtn.addEventListener("click", (e) => {
    e.preventDefault();
    moveNo();
});

// YES click
yesBtn.addEventListener("click", () => {
    confetti({
        particleCount: 250,
        spread: 120,
        origin: { y: 0.6 }
    });

    setTimeout(() => {
        alert("I knew it 💖");
    }, 400);
});
</script>

</body>
</html>
