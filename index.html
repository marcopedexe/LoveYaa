<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just One Question 💘</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    font-family: "Poppins", sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #e6dcff, #d4c5ff, #cdb4ff);
    overflow: hidden;
}

/* blobs */
.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.6;
    animation: float 10s infinite alternate ease-in-out;
}
.blob1 { width: 300px; height: 300px; background:#cdb4ff; top:10%; left:10%; }
.blob2 { width: 250px; height: 250px; background:#b8a2ff; bottom:10%; right:10%; }

@keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(40px); }
}

/* card */
.card {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(18px);
    padding: 40px 30px;
    border-radius: 28px;
    text-align: center;
    width: 350px;
    box-shadow: 0 15px 40px rgba(120,90,200,0.15);
    border: 1px solid rgba(180,160,255,0.4);
}

h2 {
    color: #5a4a8a;
    margin-bottom: 30px;
}

/* buttons */
.buttons {
    position: relative;
    height: 120px;
}

button {
    border: none;
    border-radius: 999px;
    padding: 14px 28px;
    font-size: 16px;
    cursor: pointer;
    position: absolute;
    transition: 0.25s;
}

/* YES */
#yes {
    left: 20%;
    background: linear-gradient(135deg,#9d7bff,#c8b6ff);
    color: white;
}

/* NO */
#no {
    left: 55%;
    background: #fff;
    border: 1px solid rgba(160,140,255,0.3);
}

/* ending screen */
.endScreen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #cdb4ff, #b8a2ff);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: white;
    font-size: 28px;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.6s ease;
}

.endScreen.show {
    opacity: 1;
    pointer-events: all;
}
</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">
    <h2 id="question">Hey... I just wanna ask 💗<br>Do you love me?</h2>

    <div class="buttons">
        <button id="yes">Yes 💖</button>
        <button id="no">No 😅</button>
    </div>
</div>

<div class="endScreen" id="endScreen">
    💖 You said YES 💖<br><br>
    You're mine now 😏
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const card = document.querySelector(".card");
const endScreen = document.getElementById("endScreen");

let scale = 1;

function moveNo() {
    const cardRect = card.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();

    const maxX = cardRect.width - btnRect.width;
    const maxY = cardRect.height - btnRect.height;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";

    // grow YES
    scale += 0.2;
    yesBtn.style.transform = `scale(${scale})`;

    // change YES text when big
    if (scale >= 3) {
        yesBtn.innerHTML = "just say yes 💖🥺";
    }
}

noBtn.addEventListener("mouseenter", moveNo);
noBtn.addEventListener("click", (e) => {
    e.preventDefault();
    moveNo();
});

yesBtn.addEventListener("click", () => {

    // reset
    scale = 1;
    yesBtn.style.transform = "scale(1)";
    yesBtn.innerHTML = "Yes 💖";

    // show ending screen
    endScreen.classList.add("show");

    // confetti
    confetti({ particleCount: 300, spread: 140 });

    // open new tab
    setTimeout(() => {
        window.open("https://open.spotify.com/track/1EzrEOXmMH3G43AXT1y7pA?si=9gCffcNaRP6C0uwjbwr-dA", "_blank");
    }, 1200);
});
</script>

</body>
</html>
