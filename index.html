<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just One Question 💘</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    font-family: "Poppins", sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at top, #ff9a9e, #fad0c4, #fad0c4);
    overflow: hidden;
}

/* floating blobs */
.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.5;
    animation: float 10s infinite alternate ease-in-out;
}

.blob1 { width: 300px; height: 300px; background:#ff6b81; top:10%; left:10%; }
.blob2 { width: 250px; height: 250px; background:#845ec2; bottom:10%; right:10%; }

@keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(40px); }
}

/* card */
.card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    padding: 40px 30px;
    border-radius: 30px;
    text-align: center;
    width: 350px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    animation: pop 0.8s ease;
}

@keyframes pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

h2 {
    font-weight: 600;
    color: #333;
    margin-bottom: 30px;
}

/* buttons */
.buttons {
    position: relative;
    height: 120px;
}

button {
    border: none;
    border-radius: 999px;
    padding: 14px 28px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.25s ease;
    position: absolute;
}

/* YES */
#yes {
    left: 20%;
    background: linear-gradient(135deg,#ff4d6d,#ff758f);
    color: white;
}

/* NO */
#no {
    left: 55%;
    background: #eee;
}

/* hint */
.hint {
    margin-top: 20px;
    font-size: 13px;
    color: #666;
}
</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">
    <h2 id="question">Hey... I just wanna ask 💗<br>Do you love me?</h2>

    <div class="buttons">
        <button id="yes">Yes 💖</button>
        <button id="no">No 😅</button>
    </div>

    <div class="hint">be honest hehe</div>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const question = document.getElementById("question");
const card = document.querySelector(".card");

let noCount = 0;
let scale = 1;

// move NO + grow YES
function moveNo() {
    const cardRect = card.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();

    const maxX = cardRect.width - btnRect.width;
    const maxY = cardRect.height - btnRect.height;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";

    // grow YES
    scale += 0.15;
    yesBtn.style.transform = `scale(${scale})`;

    noCount++;

    // change text after 10 tries
    if (noCount >= 10) {
        question.innerHTML = "just say yes 💖🥺";
    }
}

// trigger both hover + click (mobile)
noBtn.addEventListener("mouseenter", moveNo);
noBtn.addEventListener("click", (e) => {
    e.preventDefault();
    moveNo();
});

// YES click
yesBtn.addEventListener("click", () => {
    confetti({
        particleCount: 200,
        spread: 100
    });

    setTimeout(() => {
        alert("I knew it 💖");
    }, 400);
});
</script>

</body>
</html>
